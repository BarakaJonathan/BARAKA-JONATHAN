<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Baraka Jonathan Phinias | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              forest: {
                950: '#031411', // Deepest green
                900: '#05221B', // Card background / dark green
                800: '#083027', // Highlights / borders
                700: '#0B3A2F', // Mid green
                DEFAULT: '#0B3C30',
              },
              gold: {
                50: '#FAF8F5',  // Cream text
                100: '#F4EFE6', // Muted cream text
                200: '#EAE2D2', // Soft sand
                300: '#D7CBB3', // Light brass
                400: '#C5A880', // Champagne Gold / primary accent
                DEFAULT: '#C5A880',
                600: '#B0946E', // Muted gold
                700: '#947853', // Dark gold/bronze
              }
            },
            fontFamily: {
              serif: ['Cormorant Garamond', 'serif'],
              sans: ['Plus Jakarta Sans', 'sans-serif'],
            },
            animation: {
              'spin-slow': 'spin 12s linear infinite',
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'float': 'float 6s ease-in-out infinite',
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-20px)' },
              }
            }
          },
        },
      }
    </script>
    <style>
      /* Smooth Scrolling and Offset for Fixed Header */
      html {
        scroll-behavior: smooth;
        scroll-padding-top: 80px; /* Offset for fixed header */
      }
      
      /* Custom Scrollbar matching the theme */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #031411;
      }
      ::-webkit-scrollbar-thumb {
        background: #083027;
        border-radius: 4px;
        border: 1px solid rgba(197, 168, 128, 0.1);
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #C5A880;
      }
      
      .forest-bg {
        background-color: #031411;
        background-image: 
          radial-gradient(circle at 50% 0%, #0B3C30 0%, transparent 60%),
          radial-gradient(circle at 0% 100%, #05221B 0%, transparent 40%),
          radial-gradient(circle at 100% 100%, #06201A 0%, transparent 40%);
        background-size: 100% 100%;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
